<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>&#x92A;&#x93E;&#x923;&#x940; &#x92A;&#x93E;&#x933;&#x940; &#x91F;&#x94D;&#x930;&#x945;&#x915;&#x930; &#x1F4A7;</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:1.8rem;margin-bottom:6px;text-align:center}
.sub{color:#94a3b8;font-size:.9rem;margin-bottom:28px;text-align:center}
.card{width:100%;max-width:380px;border-radius:20px;padding:30px 24px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.4);transition:background .4s}
.mine{background:linear-gradient(135deg,#1d4ed8,#2563eb)}
.bro{background:linear-gradient(135deg,#065f46,#059669)}
.icon{font-size:3.5rem;margin-bottom:12px}
.who{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.dlabel{font-size:.95rem;color:rgba(255,255,255,.75);margin-bottom:18px}
.pwrap{background:rgba(255,255,255,.2);border-radius:50px;height:10px;margin-bottom:8px;overflow:hidden}
.pbar{height:100%;border-radius:50px;background:rgba(255,255,255,.85);transition:width .6s ease}
.ptxt{font-size:.8rem;color:rgba(255,255,255,.7);margin-bottom:22px}
.nbox{background:rgba(0,0,0,.25);border-radius:12px;padding:12px 16px;font-size:.85rem;color:rgba(255,255,255,.85)}
.nbox strong{display:block;font-size:1rem;margin-top:4px;color:#fff}
.drow{margin-top:28px;font-size:.8rem;color:#64748b;text-align:center}
.rbtn{display:inline-block;margin-top:20px;background:#1e293b;border:none;color:#94a3b8;padding:8px 20px;border-radius:50px;cursor:pointer;font-size:.85rem}
.rbtn:hover{background:#334155}
.wgrid{display:flex;gap:7px;justify-content:center;margin-top:22px}
.dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#fff;flex-direction:column}
.md{background:#2563eb}.bd{background:#059669}
.tr{outline:3px solid #fff;outline-offset:2px}
.dl{font-size:.5rem;margin-top:2px}
</style>
</head>
<body>
<h1>&#x1F4A7; &#x92A;&#x93E;&#x923;&#x940; &#x92A;&#x93E;&#x933;&#x940; &#x91F;&#x94D;&#x930;&#x945;&#x915;&#x930;</h1>
<p class="sub">&#x935;&#x93F;&#x939;&#x93F;&#x930;&#x940;&#x91A;&#x947; &#x92A;&#x93E;&#x923;&#x940; &mdash; &#x938;&#x941;&#x930;&#x91C;: 4 &#x926;&#x93F;&#x935;&#x938; &middot; &#x905;&#x92E;&#x94B;&#x932;: 2 &#x926;&#x93F;&#x935;&#x938;</p>
<div class="card" id="card">
  <div class="icon" id="icon">&#x1F4A7;</div>
  <div class="who" id="who">&#x932;&#x94B;&#x921;...</div>
  <div class="dlabel" id="dl"></div>
  <div class="pwrap"><div class="pbar" id="pb" style="width:0%"></div></div>
  <div class="ptxt" id="pt"></div>
  <div class="nbox" id="nb"></div>
</div>
<div class="wgrid" id="wg"></div>
<div class="drow" id="dr"></div>
<button class="rbtn" onclick="init()">&#x1F504; &#x930;&#x93F;&#x92B;&#x94D;&#x930;&#x947;&#x936;</button>
<script>
const REF=new Date('2026-06-14T00:00:00+05:30'),MY=4,BR=2,CY=6;
const DM=["रवि","सोम","मंगळ","बुध","गुरु","शुक्र","शनि"];
const MN=["जाने","फेब्रु","मार्च","एप्रिल","मे","जून","जुलै","ऑगस्ट","सप्टें","ऑक्टो","नोव्हें","डिसें"];
const ORD=[,"ला","रा","रा","था"];
const S="सुरज",A="अमोल";
const WAVE="&#x1F30A;",HERB="&#x1F33F;";

function ist(){const n=new Date,i=new Date(n.getTime()+(n.getTimezoneOffset()+330)*6e4);return new Date(i.getFullYear(),i.getMonth(),i.getDate())}
function cyc(d){const r=new Date(REF.getFullYear(),REF.getMonth(),REF.getDate());return((Math.floor((d-r)/864e5)%CY)+CY)%CY}
function add(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmt(d){return DM[d.getDay()]+', '+d.getDate()+' '+MN[d.getMonth()]}
function ord(n){return n+(ORD[n]||"वा")}

function init(){
  const today=ist(),c=cyc(today),mine=c<MY;
  document.getElementById('card').className='card '+(mine?'mine':'bro');
  document.getElementById('icon').innerHTML=mine?WAVE:HERB;
  document.getElementById('who').innerHTML=(mine?S:A)+'ची पाळी '+(mine?WAVE:HERB);
  const d=mine?c+1:c-MY+1,total=mine?MY:BR;
  document.getElementById('dl').textContent=(mine?S:A)+'चा '+ord(d)+' दिवस ('+total+' पैकी)';
  document.getElementById('pb').style.width=Math.round(d/total*100)+'%';
  document.getElementById('pt').textContent=d+' / '+total+' दिवस झाले';
  const next=add(today,total-d+1),who2=mine?A:S;
  document.getElementById('nb').innerHTML='पुढे: '+who2+'ची पाळी सुरू होईल<br><strong>'+fmt(next)+' ('+(mine?BR:MY)+' दिवस)</strong>';

  const wg=document.getElementById('wg');
  wg.innerHTML='';
  const cs=add(today,-cyc(today));
  for(let i=0;i<CY;i++){
    const dd=add(cs,i),isM=cyc(dd)<MY,isT=dd.getTime()===today.getTime();
    const dot=document.createElement('div');
    dot.className='dot '+(isM?'md':'bd')+(isT?' tr':'');
    dot.innerHTML=DM[dd.getDay()]+'<br><span class="dl">'+(isM?S:A)+'</span>';
    wg.appendChild(dot);
  }
  document.getElementById('dr').textContent='आज: '+fmt(today)+' | IST';
}
init();
</script>
</body>
</html>
